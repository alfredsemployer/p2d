<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>Kimi 3 — claim graph</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
:root{--bg:#0f1115;--panel:#171a21;--ink:#e7e9ee;--mut:#9aa3b2;--line:#262b36;--acc:#6ea8fe}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);font:14px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}
#hdr{position:fixed;top:0;left:0;right:0;padding:10px 16px;background:linear-gradient(#0f1115,#0f1115ee);z-index:5;border-bottom:1px solid var(--line)}
#hdr h1{font-size:16px;margin:0}#hdr p{margin:2px 0 0;color:var(--mut);font-size:12px}
#legend{position:fixed;left:14px;bottom:12px;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:9px 12px;font-size:12px;z-index:5;line-height:1.7}
#legend b{display:block;color:var(--mut);text-transform:uppercase;font-size:10px;letter-spacing:.05em;margin-bottom:3px}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}
#side{position:fixed;right:0;top:0;bottom:0;width:340px;background:var(--panel);border-left:1px solid var(--line);padding:56px 18px 18px;overflow:auto;transform:translateX(360px);transition:.2s;z-index:6}
#side.open{transform:none}#side .x{position:absolute;top:52px;right:16px;cursor:pointer;color:var(--mut)}
#side .tag{display:inline-block;font-size:10px;text-transform:uppercase;border:1px solid;border-radius:10px;padding:1px 8px;margin-bottom:8px}
#side h2{font-size:15px;margin:6px 0}#side .m{color:var(--mut);font-size:12px;margin:4px 0}#side .meas{font-size:12px;color:#b9c2d0;margin-top:8px}
#side .refs a{color:var(--acc);font:11px ui-monospace,monospace;margin-right:5px;cursor:pointer;text-decoration:none}
svg{width:100vw;height:100vh}
line.link{stroke:#2c3340;stroke-width:1}
circle{cursor:pointer;stroke:#0f1115;stroke-width:1.5}
text.lbl{font:9px ui-monospace,monospace;fill:#c7cfdd;pointer-events:none;text-anchor:middle}
.hint{color:var(--mut);font-size:11px}
</style></head><body>
<div id="hdr"><h1>Kimi 3 — atomic claim graph</h1><p>33 claims → 11 hypotheses. Node colour = the model's verdict. Click any node to read the claim. Drag to rearrange. <span class="hint">squares = hypotheses</span></p></div>

<span class="dot" style="background:#e0a458"></span>contested / not established<br>

<span class="dot" style="background:#a78bda"></span>conflated (split)<br>
<span class="dot" style="background:#454b57"></span>untested</div>
<div id="side"><span class="x" onclick="document.getElementById('side').classList.remove('open')">✕ close</span><div id="sidebody"></div></div>
<svg></svg>
<script>
const data={"nodes": [{"id": "H1", "t": "hyp", "label": "H1", "title": "K3 is significant because it brings frontier-adjacent capability into the open-weight ecosystem and narrows the gap with proprietary models.", "verdict": "UNKNOWN", "meta": "combine AND \u00b7 gate L1", "refs": ["A2", "A3", "A4"]}, {"id": "H2", "t": "hyp", "label": "H2", "title": "K3's main technical contribution is efficiency-oriented architecture and training rather than raw parameter scale.", "verdict": "NOT ESTABLISHED", "meta": "combine AND \u00b7 gate L2", "refs": ["A5", "A6", "A7", "A8"]}, {"id": "H3", "t": "hyp", "label": "H3", "title": "K3's open status is more nominal than practical because its size and infrastructure requirements restrict independent use.", "verdict": "LEANS FALSE", "meta": "combine AND \u00b7 gate L3", "refs": ["A2", "A7", "A9", "A10"]}, {"id": "H4", "t": "hyp", "label": "H4", "title": "K3 is strongest in coding, long-context, automation, and agentic workflows rather than representing broad superiority or general intelligence.", "verdict": "UNKNOWN", "meta": "combine AND \u00b7 gate L4", "refs": ["A11", "A12"]}, {"id": "H5", "t": "hyp", "label": "H5", "title": "K3's competitive significance is overstated because headline results depend on vendor-selected benchmarks, mismatched harnesses, verbosity, or possible contamination.", "verdict": "UNKNOWN", "meta": "combine OR \u00b7 gate L5", "refs": ["A13", "A14", "A15", "A16"]}, {"id": "H6", "t": "hyp", "label": "H6", "title": "K3 is primarily a geopolitical and symbolic signal that Chinese labs can remain near the frontier under export controls, rather than a decisive capability lead.", "verdict": "UNKNOWN", "meta": "combine AND \u00b7 gate L6", "refs": ["A17", "A18", "A19", "A20"]}, {"id": "H7", "t": "hyp", "label": "H7", "title": "K3 could accelerate commoditization and pressure proprietary-model pricing and market structure.", "verdict": "UNKNOWN", "meta": "combine AND \u00b7 gate L7", "refs": ["A21", "A22"]}, {"id": "H8", "t": "hyp", "label": "H8", "title": "K3's low API pricing or open availability will not automatically produce broad adoption because latency, token use, reliability, tooling, support, compliance, and deployment costs remain binding constraints.", "verdict": "LEANS FALSE", "meta": "combine AND \u00b7 gate L8", "refs": ["A2", "A23", "A24", "A25"]}, {"id": "H9", "t": "hyp", "label": "H9", "title": "K3's immediate market and demand reaction is a weak indicator of durable significance and may reflect novelty, scarcity, or hype.", "verdict": "NOT ESTABLISHED", "meta": "combine AND \u00b7 gate L9", "refs": ["A26", "A27", "A28"]}, {"id": "H10", "t": "hyp", "label": "H10", "title": "Open release expands both innovation and misuse risk relative to proprietary access.", "verdict": "UNKNOWN", "meta": "combine AND \u00b7 gate L10", "refs": ["A2", "A29", "A30"]}, {"id": "H11", "t": "hyp", "label": "H11", "title": "Any verified distillation, training-data leakage, or benchmark-contamination issue would materially reduce the evidentiary value of K3's reported achievement.", "verdict": "UNKNOWN", "meta": "combine OR \u00b7 gate L11", "refs": ["A16", "A31", "A32", "A33"]}, {"id": "A1", "t": "atom", "label": "A1", "title": "The evaluated system is Moonshot AI's Kimi K3, not another Kimi product.", "verdict": "untested", "meta": "definitional \u00b7 categorical", "refs": ["H1", "H2", "H3", "H4", "H5", "H6", "H7", "H8", "H9", "H10", "H11"], "measure": "Moonshot K3; Kimi chatbot version; Kimi K2.x; other product"}, {"id": "A2", "t": "atom", "label": "A2", "title": "K3's access and openness span public API, downloadable weights, code, license, data, and reproducibility.", "verdict": "refuted", "meta": "empirical \u00b7 categorical", "refs": ["H1", "H3", "H8", "H10"], "measure": "each dimension coded absent, restricted, or public"}, {"id": "A3", "t": "atom", "label": "A3", "title": "K3's capability gap to named proprietary frontier versions is measurable across a representative task suite.", "verdict": "contested", "meta": "empirical \u00b7 quantify", "refs": ["H1", "H4", "H5", "H6"], "measure": "benchmark score and percentage-point gap by task, version, harness, and date"}, {"id": "A4", "t": "atom", "label": "A4", "title": "K3's reported claims are independently verified under disclosed evaluation conditions.", "verdict": "conflated", "meta": "empirical \u00b7 categorical", "refs": ["H1", "H5", "H11"], "measure": "verified, partially verified, unverified, or contradicted"}, {"id": "A5", "t": "atom", "label": "A5", "title": "K3 uses identifiable architectural mechanisms relevant to efficiency.", "verdict": "untested", "meta": "empirical \u00b7 categorical", "refs": ["H2"], "measure": "dense, mixture-of-experts, sparsity, attention variant, compression, or other disclosed mechanism"}, {"id": "A6", "t": "atom", "label": "A6", "title": "K3 uses identifiable training methods relevant to efficiency.", "verdict": "supported", "meta": "empirical \u00b7 categorical", "refs": ["H2", "H11"], "measure": "data curation, curriculum, distillation, reinforcement learning, synthetic data, or other disclosed method"}, {"id": "A7", "t": "atom", "label": "A7", "title": "K3's scale can be separated from its architecture and training contribution.", "verdict": "conflated", "meta": "empirical \u00b7 quantify", "refs": ["H2", "H3"], "measure": "total parameters, active parameters, training tokens, training FLOPs, memory footprint, and inference FLOPs"}, {"id": "A8", "t": "atom", "label": "A8", "title": "Architecture or training produces capability efficiency beyond what scale and implementation explain.", "verdict": "insufficient", "meta": "causal \u00b7 quantify", "refs": ["H2"], "measure": "capability score per training FLOP, active parameter, memory unit, or inference token"}, {"id": "A9", "t": "atom", "label": "A9", "title": "Independent users can run K3 with available hardware and deployment resources.", "verdict": "supported", "meta": "empirical \u00b7 quantify", "refs": ["H3", "H8"], "measure": "hardware type, memory GB, peak power, setup hours, throughput tokens per second, and operators required"}, {"id": "A10", "t": "atom", "label": "A10", "title": "K3's resource requirements restrict independent use despite its formal openness.", "verdict": "insufficient", "meta": "causal \u00b7 ordinal", "refs": ["H3"], "measure": "deployment burden: trivial, modest, substantial, prohibitive"}, {"id": "A11", "t": "atom", "label": "A11", "title": "K3's strongest performance is concentrated in coding, long-context, automation, and agentic tasks.", "verdict": "supported", "meta": "empirical \u00b7 ordinal", "refs": ["H4"], "measure": "domain profile: weak, mixed, strong, leading, with named tasks and scores"}, {"id": "A12", "t": "atom", "label": "A12", "title": "K3 has broad performance across representative non-specialist tasks.", "verdict": "untested", "meta": "empirical \u00b7 ordinal", "refs": ["H4"], "measure": "breadth: narrow, domain-limited, multi-domain, general-purpose, broad frontier"}, {"id": "A13", "t": "atom", "label": "A13", "title": "K3's reported competitive results use vendor-selected benchmarks.", "verdict": "untested", "meta": "empirical \u00b7 categorical", "refs": ["H5"], "measure": "vendor-only, mixed vendor-independent, or independently selected"}, {"id": "A14", "t": "atom", "label": "A14", "title": "K3 comparisons use harnesses, prompts, tools, versions, and dates that are matched across models.", "verdict": "refuted", "meta": "empirical \u00b7 categorical", "refs": ["H5"], "measure": "matched, partially matched, or mismatched"}, {"id": "A15", "t": "atom", "label": "A15", "title": "K3's verbosity or token usage changes its apparent evaluation advantage.", "verdict": "untested", "meta": "causal \u00b7 quantify", "refs": ["H5"], "measure": "score change and output-token change under length-controlled prompting"}, {"id": "A16", "t": "atom", "label": "A16", "title": "K3 evaluation data overlap with training or tuning data.", "verdict": "insufficient", "meta": "empirical \u00b7 quantify", "refs": ["H5", "H11"], "measure": "documented or detected overlap as examples, tokens, or dataset fraction"}, {"id": "A17", "t": "atom", "label": "A17", "title": "Chinese labs achieve near-frontier performance under relevant export-control constraints.", "verdict": "untested", "meta": "empirical \u00b7 ordinal", "refs": ["H6"], "measure": "relative position: below frontier, near-frontier, frontier-parity, or frontier-leading"}, {"id": "A18", "t": "atom", "label": "A18", "title": "Relevant export controls materially constrain Chinese AI compute, hardware, or supply chains.", "verdict": "untested", "meta": "empirical \u00b7 ordinal", "refs": ["H6"], "measure": "constraint intensity: negligible, limited, material, severe"}, {"id": "A19", "t": "atom", "label": "A19", "title": "K3 does not establish a decisive capability lead over frontier rivals.", "verdict": "supported", "meta": "empirical \u00b7 ordinal", "refs": ["H6"], "measure": "relative lead: none, narrow, substantial, decisive"}, {"id": "A20", "t": "atom", "label": "A20", "title": "K3 produces geopolitical or symbolic signaling about Chinese AI capacity.", "verdict": "untested", "meta": "empirical \u00b7 ordinal", "refs": ["H6"], "measure": "signal strength: negligible, limited, notable, major"}, {"id": "A21", "t": "atom", "label": "A21", "title": "K3 is followed by lower proprietary-model prices or changed market structure.", "verdict": "untested", "meta": "empirical \u00b7 quantify", "refs": ["H7"], "measure": "API price, gross margin, market share, concentration, and substitution change over time"}, {"id": "A22", "t": "atom", "label": "A22", "title": "K3 causally accelerates commoditization or pricing pressure.", "verdict": "insufficient", "meta": "causal \u00b7 quantify", "refs": ["H7"], "measure": "change in price, margin, supplier concentration, or capability-price ratio attributable to K3"}, {"id": "A23", "t": "atom", "label": "A23", "title": "K3's API price or open access is materially lower or broader than relevant alternatives.", "verdict": "supported", "meta": "empirical \u00b7 quantify", "refs": ["H7", "H8"], "measure": "currency per input and output token, access terms, rate limits, and license rights"}, {"id": "A24", "t": "atom", "label": "A24", "title": "Latency, token use, reliability, tooling, support, compliance, and deployment costs constrain K3 adoption.", "verdict": "untested", "meta": "empirical \u00b7 quantify", "refs": ["H8"], "measure": "latency, tokens per task, failure rate, integration hours, support cost, compliance findings, and total cost per useful task"}, {"id": "A25", "t": "atom", "label": "A25", "title": "These constraints causally reduce adoption despite low price or open access.", "verdict": "refuted", "meta": "causal \u00b7 quantify", "refs": ["H8"], "measure": "adoption change attributable to each constraint, measured as users, deployments, workloads, or task share"}, {"id": "A26", "t": "atom", "label": "A26", "title": "K3's immediate market and demand reaction is measurable.", "verdict": "untested", "meta": "empirical \u00b7 quantify", "refs": ["H9"], "measure": "search interest, downloads, API calls, signups, investment, sales, and media volume over time"}, {"id": "A27", "t": "atom", "label": "A27", "title": "K3's significance persists through adoption, replication, ecosystem effects, pricing, policy, or downstream products.", "verdict": "supported", "meta": "empirical \u00b7 ordinal", "refs": ["H9"], "measure": "durability: launch-only, short-lived, sustained, institutionalized"}, {"id": "A28", "t": "atom", "label": "A28", "title": "Novelty, scarcity, or hype contributes to K3's immediate reaction.", "verdict": "untested", "meta": "empirical \u00b7 ordinal", "refs": ["H9"], "measure": "contribution: absent, minor, mixed, dominant"}, {"id": "A29", "t": "atom", "label": "A29", "title": "Open access increases downstream innovation relative to proprietary access.", "verdict": "untested", "meta": "causal \u00b7 quantify", "refs": ["H10"], "measure": "change in independent models, tools, papers, deployments, or developer activity"}, {"id": "A30", "t": "atom", "label": "A30", "title": "Open access increases misuse or harmful deployment relative to proprietary access.", "verdict": "insufficient", "meta": "causal \u00b7 quantify", "refs": ["H10"], "measure": "change in misuse incidents, harmful capability demonstrations, or abuse reports"}, {"id": "A31", "t": "atom", "label": "A31", "title": "K3 has verified distillation from another model.", "verdict": "untested", "meta": "empirical \u00b7 categorical", "refs": ["H11"], "measure": "no evidence, suggestive evidence, documented, or independently confirmed"}, {"id": "A32", "t": "atom", "label": "A32", "title": "K3 has verified training-data leakage affecting its reported achievement.", "verdict": "untested", "meta": "empirical \u00b7 categorical", "refs": ["H11"], "measure": "none detected, suspected, documented, or independently confirmed"}, {"id": "A33", "t": "atom", "label": "A33", "title": "Verified distillation, leakage, or contamination materially lowers the evidentiary value of K3's reported results.", "verdict": "insufficient", "meta": "causal \u00b7 ordinal", "refs": ["H11"], "measure": "reduction in evidentiary value: none, limited, substantial, disqualifying"}], "links": [{"source": "A2", "target": "H1"}, {"source": "A3", "target": "H1"}, {"source": "A4", "target": "H1"}, {"source": "A5", "target": "H2"}, {"source": "A6", "target": "H2"}, {"source": "A7", "target": "H2"}, {"source": "A8", "target": "H2"}, {"source": "A2", "target": "H3"}, {"source": "A7", "target": "H3"}, {"source": "A9", "target": "H3"}, {"source": "A10", "target": "H3"}, {"source": "A11", "target": "H4"}, {"source": "A12", "target": "H4"}, {"source": "A13", "target": "H5"}, {"source": "A14", "target": "H5"}, {"source": "A15", "target": "H5"}, {"source": "A16", "target": "H5"}, {"source": "A17", "target": "H6"}, {"source": "A18", "target": "H6"}, {"source": "A19", "target": "H6"}, {"source": "A20", "target": "H6"}, {"source": "A21", "target": "H7"}, {"source": "A22", "target": "H7"}, {"source": "A2", "target": "H8"}, {"source": "A23", "target": "H8"}, {"source": "A24", "target": "H8"}, {"source": "A25", "target": "H8"}, {"source": "A26", "target": "H9"}, {"source": "A27", "target": "H9"}, {"source": "A28", "target": "H9"}, {"source": "A2", "target": "H10"}, {"source": "A29", "target": "H10"}, {"source": "A30", "target": "H10"}, {"source": "A16", "target": "H11"}, {"source": "A31", "target": "H11"}, {"source": "A32", "target": "H11"}, {"source": "A33", "target": "H11"}]};
const C={supported:'#5fbf7f',refuted:'#e06666',contested:'#e0a458',insufficient:'#8a91a0',conflated:'#a78bda',untested:'#454b57',
'SUPPORTED':'#5fbf7f','LEANS FALSE':'#e06666','UNKNOWN':'#8a91a0','NOT ESTABLISHED':'#e0a458','CONTESTED':'#e0a458'};
const col=d=>C[d.verdict]||'#8a91a0';
const byId={};data.nodes.forEach(n=>byId[n.id]=n);
const svg=d3.select('svg'),W=innerWidth,Hh=innerHeight;
const g=svg.append('g');
svg.call(d3.zoom().scaleExtent([0.3,3]).on('zoom',e=>g.attr('transform',e.transform)));
const sim=d3.forceSimulation(data.nodes)
 .force('link',d3.forceLink(data.links).id(d=>d.id).distance(60).strength(0.5))
 .force('charge',d3.forceManyBody().strength(-160))
 .force('center',d3.forceCenter(W/2,Hh/2))
 .force('collide',d3.forceCollide().radius(d=>d.t=='hyp'?20:12));
const link=g.selectAll('line').data(data.links).join('line').attr('class','link');
const node=g.selectAll('g.n').data(data.nodes).join('g').attr('class','n').call(drag(sim)).on('click',(e,d)=>show(d));
node.append(d=>document.createElementNS('http://www.w3.org/2000/svg',d.t=='hyp'?'rect':'circle'))
 .each(function(d){const s=d3.select(this);if(d.t=='hyp'){s.attr('width',24).attr('height',24).attr('x',-12).attr('y',-12).attr('rx',4)}else{s.attr('r',8)}s.attr('fill',col(d)).attr('stroke','#0f1115').attr('stroke-width',1.5)});
node.append('text').attr('class','lbl').attr('dy',3).text(d=>d.label);
sim.on('tick',()=>{link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);node.attr('transform',d=>`translate(${d.x},${d.y})`)});
function show(d){const b=document.getElementById('sidebody');const c=col(d);
 const refs=(d.refs||[]).map(r=>`<a onclick="show(byId['${r}'])">${r}</a>`).join(' ');
 b.innerHTML=`<span class="tag" style="color:${c};border-color:${c}">${d.verdict}</span>
 <div class="m">${d.id} · ${d.t=='hyp'?'hypothesis':'atomic claim'} · ${d.meta||''}</div>
 <h2>${d.title}</h2>${d.measure?`<div class="meas"><b>measure:</b> ${d.measure}</div>`:''}
 <div class="m" style="margin-top:12px">${d.t=='hyp'?'built from:':'used by:'}</div><div class="refs">${refs||'—'}</div>`;
 document.getElementById('side').classList.add('open');}
function drag(sim){function a(e,d){if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y}
 function b(e,d){d.fx=e.x;d.fy=e.y}function c(e,d){if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}
 return d3.drag().on('start',a).on('drag',b).on('end',c)}
</script></body></html>
