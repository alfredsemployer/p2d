<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>Why — Kimi 3</title>
<style>
:root{--ink:#f5f5f7;--mut:rgba(245,245,247,.5);--faint:rgba(245,245,247,.28);
 --green:#5ad9a6;--amber:#f0b45e;--gray:#8a93a3;--indigo:#9a86ff;--blue:#5b9dff}
*{margin:0;box-sizing:border-box}
html,body{height:100%;background:#060608;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;background:
 radial-gradient(1000px 620px at 70% 46%,rgba(154,134,255,.09),transparent 60%),
 radial-gradient(720px 520px at 92% 46%,rgba(90,217,166,.06),transparent 60%),#060608}
body::after{content:"";position:fixed;inset:0;z-index:0;opacity:.45;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:34px 34px;-webkit-mask-image:radial-gradient(80% 80% at 50% 45%,#000,transparent 78%);mask-image:radial-gradient(80% 80% at 50% 45%,#000,transparent 78%)}
/* header */
.hdr{position:fixed;top:0;left:0;right:0;z-index:7;padding:20px 26px 14px;background:linear-gradient(#060608,#060608cc,transparent)}
.hdr .ask{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);font-weight:600}
.hdr .q{font-size:21px;font-weight:600;letter-spacing:-.02em;margin-top:4px}
.hdr .q .cursor{color:var(--indigo)}
.toggle{position:fixed;top:22px;right:24px;z-index:8;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mut);cursor:pointer;
 background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:999px;padding:7px 13px;transition:.3s;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.toggle.on{color:var(--indigo);border-color:rgba(154,134,255,.4);box-shadow:0 0 24px -8px var(--indigo)}
.toggle .sw{width:26px;height:15px;border-radius:999px;background:rgba(255,255,255,.14);position:relative;transition:.3s}
.toggle.on .sw{background:var(--indigo)}.toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:11px;height:11px;border-radius:50%;background:#fff;transition:.3s}
.toggle.on .sw::after{left:13px}
/* stage */
.wrap{position:fixed;inset:0;z-index:2}
.stage{position:absolute;top:0;left:0;width:1400px;height:640px;transform-origin:0 0;transition:transform .7s cubic-bezier(.5,.1,.15,1)}
svg.edges{position:absolute;inset:0;width:1400px;height:640px;overflow:visible}
.node{position:absolute;border-radius:19px;padding:15px 18px;
 background:linear-gradient(180deg,rgba(255,255,255,.062),rgba(255,255,255,.02));
 border:1px solid rgba(255,255,255,.10);-webkit-backdrop-filter:blur(13px) saturate(1.3);backdrop-filter:blur(13px) saturate(1.3);
 box-shadow:0 20px 55px -22px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.09);
 transition:transform .6s cubic-bezier(.2,.8,.2,1),opacity .6s,box-shadow .5s,filter .6s;cursor:pointer;z-index:3}
.node:hover{transform:translateY(-3px)}
.node .kind{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.node .kind .kl{display:flex;align-items:center;gap:7px;font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:700}
.node .kind .kl .d{width:7px;height:7px;border-radius:50%}
.node .title{font-size:16px;font-weight:540;letter-spacing:-.01em;line-height:1.25}
.node.pillar{width:320px;min-height:104px}
.node.answer{width:470px;min-height:210px;padding:20px 24px;border-color:rgba(154,134,255,.26);
 background:linear-gradient(180deg,rgba(154,134,255,.10),rgba(255,255,255,.02));
 box-shadow:0 26px 80px -20px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.12),0 0 90px -20px var(--indigo)}
.node.answer .title{font-size:23px;font-weight:600;line-height:1.22;margin:6px 0 4px}
.node.answer .verdict{font-size:12px;color:var(--mut);margin-top:10px}
.lb{display:inline-flex;align-items:center;gap:5px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;font-weight:700;color:var(--indigo);
 background:rgba(154,134,255,.13);border:1px solid rgba(154,134,255,.3);border-radius:999px;padding:2px 8px;margin-top:11px}
.node.lbn{border-color:rgba(154,134,255,.32)}
.node.lbn::before{content:"";position:absolute;inset:-1px;border-radius:19px;border:1px solid rgba(154,134,255,.35);animation:ring 3.5s ease-in-out infinite;pointer-events:none}
@keyframes ring{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.7;transform:scale(1.012)}}
/* segment confidence bar */
.seg{display:flex;gap:4px;align-items:center}.seg i{width:15px;height:7px;border-radius:2px;background:rgba(255,255,255,.11)}
.seg .lbl{font-size:10px;color:var(--faint);margin-left:6px;letter-spacing:.05em}
/* dim / focus states */
.stage.focus .node:not(.sel){opacity:.22;filter:blur(1.5px)}
.stage.focus.edges-dim path{opacity:.12}
.stage.spot .node.dim{opacity:.2;filter:blur(1px)}
/* detail panel */
.detail{position:fixed;top:0;right:0;bottom:0;width:400px;max-width:88vw;z-index:9;padding:70px 26px 26px;overflow:auto;
 background:linear-gradient(180deg,rgba(20,22,28,.85),rgba(12,13,17,.92));border-left:1px solid rgba(255,255,255,.09);
 -webkit-backdrop-filter:blur(22px) saturate(1.3);backdrop-filter:blur(22px) saturate(1.3);
 transform:translateX(102%);transition:transform .55s cubic-bezier(.4,.1,.15,1)}
.detail.on{transform:none}
.detail .back{position:absolute;top:22px;left:24px;color:var(--mut);cursor:pointer;font-size:13px;display:flex;align-items:center;gap:6px}
.detail .dkind{font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.detail h2{font-size:22px;font-weight:600;letter-spacing:-.02em;line-height:1.22}
.detail .row{margin-top:18px}.detail .rl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:7px}
.detail .why{font-size:14px;color:var(--ink);line-height:1.45}
.ev{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:13px;padding:12px 14px;margin-bottom:9px}
.ev .q{font-size:13.5px;line-height:1.45;color:rgba(245,245,247,.9)}
.ev .s{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:11px;color:var(--mut)}
.ev .s a{color:var(--blue);text-decoration:none}
.flip{font-size:13px;color:var(--amber);line-height:1.45;background:rgba(240,180,94,.06);border:1px solid rgba(240,180,94,.18);border-radius:12px;padding:11px 13px}
.legend{position:fixed;bottom:20px;left:26px;z-index:6;font-size:11px;color:var(--faint)}
</style></head><body>
<div class="hdr"><div class="ask">You asked</div><div class="q">What is the significance of Kimi&nbsp;3?<span class="cursor">▏</span></div></div>
<div class="toggle" id="tg" onclick="toggleSpot()"><span class="sw"></span> load-bearing</div>
<div class="wrap"><div class="stage" id="stage">
 <svg class="edges" viewBox="0 0 1400 640"><defs>
   <filter id="gl" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
   <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 1 L9 5 L0 9 Z" fill="#9a86ff" opacity=".8"/></marker>
   <linearGradient id="eg" x1="0" x2="1"><stop offset="0" stop-color="#6b7688"/><stop offset="1" stop-color="#9a86ff"/></linearGradient>
 </defs><g id="edges" filter="url(#gl)"></g></svg>
 <div id="nodes"></div>
</div></div>
<div class="detail" id="detail"><div class="back" onclick="overview()">‹ back to the answer</div><div id="db"></div></div>
<div class="legend">click a claim to open its evidence · toggle to spotlight what the answer hangs on</div>
<script>
const A={green:'#5ad9a6',amber:'#f0b45e',gray:'#8a93a3',indigo:'#9a86ff'};
const NODES=[
 {id:'ANS',cls:'answer',x:820,y:215,kind:'The answer',kc:A.indigo,conf:3,verdict:'Calibrated across 11 sub-questions · contested where evidence is thin',
   title:'A credible, cheap, near-frontier model — not a proven breakthrough.'},
 {id:'P1',x:80,y:24,kind:'Proposition',kc:A.green,conf:4,lb:true,title:'Independently ranked ~#3, Opus-4.8 level',
   why:'This is what makes “credible / near-frontier” true at all — it’s the load-bearing support for the whole positive half of the answer.',
   flip:'An independent, same-harness evaluation placing K3 well below the top tier.',
   ev:[{q:'K3 scores 57 on the Intelligence Index — #3 overall, comparable to Opus 4.8 and GPT-5.5.',s:'Artificial Analysis',u:'artificialanalysis.ai'},
       {q:'Independent blind community voting places K3 on the WebDev arena leaderboard.',s:'Arena',u:'arena.ai'}]},
 {id:'P2',x:80,y:148,kind:'Proposition',kc:A.green,conf:4,lb:true,title:'Headline wins aren’t independently reproduced',
   why:'This is what caps the answer *below* “proven breakthrough.” Without it, the marketing numbers would carry the verdict.',
   flip:'Moonshot’s technical report plus third-party reproductions matching the headline numbers.',
   ev:[{q:'Every published K3 number is Moonshot-reported or drawn from its own API.',s:'Tom’s Hardware',u:'tomshardware.com'},
       {q:'No independent third-party benchmarks for K3 exist yet.',s:'techsy.io',u:'techsy.io'},
       {q:'Agent-harness choice alone swings scores dramatically — a 17-point gap.',s:'Kili Technology',u:'kili-technology.com'}]},
 {id:'P3',x:80,y:272,kind:'Proposition',kc:A.green,conf:3,title:'Materially cheaper & independently runnable',
   why:'Supports the “cheap / accessible” half — solid, but the real-world cost of ownership isn’t fully pinned down.',
   flip:'Deployment costs or license limits eating the sticker-price advantage.',
   ev:[{q:'Listed at $3 / $15 per million tokens — materially below comparable US models.',s:'OpenRouter',u:'openrouter.ai'},
       {q:'Runnable by independent users on available multi-GPU hardware.',s:'HF overview',u:'huggingface.co'}]},
 {id:'P4',x:80,y:396,kind:'Proposition',kc:A.amber,conf:2,title:'Not yet fully open (weights ~July 27)',
   why:'A caveat on the “open” framing — currently a promise, not a fact, so it can’t yet count toward the answer.',
   flip:'Weights plus a permissive license actually shipping on July 27.',
   ev:[{q:'Open weights promised on Hugging Face “by July 27”; license terms still TBD.',s:'release notes',u:''}]},
 {id:'P5',x:80,y:520,kind:'Proposition',kc:A.gray,conf:1,title:'An efficiency breakthrough?',
   why:'Speculative — not load-bearing. It could strengthen the answer, but there’s no evidence yet either way.',
   flip:'A published analysis isolating architecture/training efficiency from raw scale.',
   ev:[{q:'No independent analysis separates architecture efficiency from scale. Too early to call.',s:'—',u:''}]},
];
const EDGES=[['P1','ANS'],['P2','ANS'],['P3','ANS'],['P4','ANS'],['P5','ANS']];
const byId={};NODES.forEach(n=>byId[n.id]=n);
const W=1400,H=640;
function harvey(conf,color,size){size=size||15;const r=size/2-1,c=size/2,f=conf/5;let fill='';
 if(f>=1)fill=`<circle cx=${c} cy=${c} r=${r} fill="${color}"/>`;
 else if(f>0){const a=f*2*Math.PI,ex=c+r*Math.sin(a),ey=c-r*Math.cos(a),lg=f>.5?1:0;fill=`<path d="M${c},${c} L${c},${c-r} A${r},${r} 0 ${lg} 1 ${ex},${ey} Z" fill="${color}"/>`;}
 return `<svg width=${size} height=${size} viewBox="0 0 ${size} ${size}"><circle cx=${c} cy=${c} r=${r} fill="none" stroke="${color}" stroke-width="1.2" opacity=".5"/>${fill}</svg>`;}
function segbar(conf,color){let s='<div class="seg">';for(let i=0;i<5;i++)s+=`<i style="background:${i<conf?color:'rgba(255,255,255,.11)'}"></i>`;return s+`<span class="lbl">${conf}/5 confidence</span></div>`;}
// build nodes
const nc=document.getElementById('nodes');
NODES.forEach(n=>{const d=document.createElement('div');d.className='node '+(n.cls||'pillar')+(n.lb?' lbn':'');d.style.left=n.x+'px';d.style.top=n.y+'px';d.dataset.id=n.id;
 let inner=`<div class="kind"><span class="kl" style="color:${n.kc}"><span class="d" style="background:${n.kc}"></span>${n.kind}</span>${n.cls!='answer'?harvey(n.conf,n.kc,15):''}</div><div class="title">${n.title}</div>`;
 if(n.cls=='answer')inner+=`<div style="margin-top:14px">${segbar(n.conf,A.indigo)}</div><div class="verdict">${n.verdict}</div>`;
 else if(n.lb)inner+=`<div class="lb">◆ load-bearing</div>`;
 d.innerHTML=inner;d.onclick=e=>{e.stopPropagation();focus(n.id)};nc.appendChild(d);});
// build edges
const eg=document.getElementById('edges');
function cy(n){return n.y+(n.cls=='answer'?105:52)}
EDGES.forEach(([a,b])=>{const s=byId[a],t=byId[b];const x1=s.x+320,y1=cy(s),x2=t.x,y2=cy(t);
 const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M${x1},${y1} C${x1+150},${y1} ${x2-150},${y2} ${x2},${y2}`);
 p.setAttribute('stroke','url(#eg)');p.setAttribute('stroke-width',byId[a].lb?2.1:1.4);p.setAttribute('fill','none');p.setAttribute('marker-end','url(#ar)');p.setAttribute('opacity',byId[a].lb?.95:.6);p.dataset.a=a;eg.appendChild(p);
 // signal
 const cir=document.createElementNS('http://www.w3.org/2000/svg','circle');cir.setAttribute('r',byId[a].lb?2.6:2);cir.setAttribute('fill',byId[a].lb?'#c9c2ff':'#8b93a8');
 const am=document.createElementNS('http://www.w3.org/2000/svg','animateMotion');am.setAttribute('dur',(2.2+Math.random()*1.4).toFixed(1)+'s');am.setAttribute('repeatCount','indefinite');
 const mp=document.createElementNS('http://www.w3.org/2000/svg','mpath');mp.setAttribute('href','#'+'');am.appendChild(mp);cir.appendChild(am);eg.appendChild(cir);
 p.id='e-'+a;mp.setAttributeNS('http://www.w3.org/1999/xlink','href','#e-'+a);mp.setAttribute('href','#e-'+a);});
// layout transforms
const stage=document.getElementById('stage');
let mode='over';
function tf(scale,tx,ty){stage.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`}
function fit(){return Math.min(innerWidth/W,(innerHeight-90)/H)*(innerWidth<760?.96:.86)}
function overview(){mode='over';const s=fit();tf(s,(innerWidth-W*s)/2,(innerHeight-H*s)/2+34);
 stage.classList.remove('focus');document.querySelectorAll('.node').forEach(n=>n.classList.remove('sel'));
 document.getElementById('detail').classList.remove('on');}
function focus(id){mode='focus';const n=byId[id];const s=fit()*(innerWidth<760?1.15:1.5);
 const cxp=innerWidth<760?innerWidth*.5:innerWidth*.30, cyp=innerWidth<760?innerHeight*.34:innerHeight*.46;
 const w=(n.cls=='answer'?470:320),h=(n.cls=='answer'?210:104);
 tf(s, cxp-(n.x+w/2)*s, cyp-(n.y+h/2)*s);
 stage.classList.add('focus');document.querySelectorAll('.node').forEach(e=>e.classList.toggle('sel',e.dataset.id==id));
 // detail
 const db=document.getElementById('db');
 let ev=(n.ev||[]).map(e=>`<div class="ev"><div class="q">“${e.q}”</div><div class="s"><span>${e.s}</span>${e.u?`<a href="https://${e.u}" target="_blank">${e.u} ↗</a>`:''}</div></div>`).join('');
 db.innerHTML=`<div class="dkind" style="color:${n.kc}">${n.kind}${n.lb?' · ◆ load-bearing':''}</div><h2>${n.title}</h2>
  <div class="row"><div class="rl">confidence</div>${segbar(n.conf,n.kc)}</div>
  ${n.why?`<div class="row"><div class="rl">why it matters</div><div class="why">${n.why}</div></div>`:''}
  ${ev?`<div class="row"><div class="rl">supporting evidence</div>${ev}</div>`:''}
  ${n.flip?`<div class="row"><div class="rl">what would change this</div><div class="flip">${n.flip}</div></div>`:''}`;
 document.getElementById('detail').classList.add('on');}
// load-bearing spotlight
let spot=false;
function toggleSpot(){spot=!spot;document.getElementById('tg').classList.toggle('on',spot);
 stage.classList.toggle('spot',spot);
 document.querySelectorAll('.node').forEach(e=>{const n=byId[e.dataset.id];e.classList.toggle('dim',spot&&!(n.lb||n.cls=='answer'))});
 document.querySelectorAll('#edges path').forEach(p=>p.style.opacity=spot?(byId[p.dataset.a]&&byId[p.dataset.a].lb?.95:.08):'');}
document.querySelector('.wrap').addEventListener('click',overview);
addEventListener('resize',()=>{mode=='over'?overview():null});
overview();
</script></body></html>
