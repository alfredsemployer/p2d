<!doctype html><html><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>Why — Kimi 3</title>
<style>
:root{--ink:#f5f5f7;--mut:rgba(245,245,247,.5);--faint:rgba(245,245,247,.28);
 --green:#5ad9a6;--amber:#f0b45e;--gray:#8a93a3;--indigo:#9a86ff;--blue:#5b9dff;--sb:392px}
*{margin:0;box-sizing:border-box}
html,body{height:100%;background:#060608;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(900px 600px at 55% 42%,rgba(154,134,255,.09),transparent 60%),#060608}
body::after{content:"";position:fixed;inset:0;z-index:0;opacity:.4;background-image:radial-gradient(rgba(255,255,255,.04) 1px,transparent 1px);background-size:32px 32px;-webkit-mask-image:radial-gradient(75% 75% at 45% 45%,#000,transparent 78%);mask-image:radial-gradient(75% 75% at 45% 45%,#000,transparent 78%)}
.hdr{position:fixed;top:0;left:0;right:var(--sb);z-index:7;padding:18px 26px 12px;background:linear-gradient(#060608,#060608bb,transparent)}
.hdr .ask{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);font-weight:600}
.hdr .q{font-size:20px;font-weight:600;letter-spacing:-.02em;margin-top:3px}.hdr .q .c{color:var(--indigo)}
.toggle{position:fixed;top:20px;right:calc(var(--sb) + 20px);z-index:8;display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--mut);cursor:pointer;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:999px;padding:6px 12px;transition:.3s;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.toggle.on{color:var(--indigo);border-color:rgba(154,134,255,.4);box-shadow:0 0 22px -8px var(--indigo)}
.toggle .sw{width:24px;height:14px;border-radius:999px;background:rgba(255,255,255,.14);position:relative;transition:.3s}
.toggle.on .sw{background:var(--indigo)}.toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:#fff;transition:.3s}.toggle.on .sw::after{left:12px}
.graph{position:fixed;left:0;top:0;bottom:0;right:var(--sb);z-index:2;cursor:default}
.stage{position:absolute;top:0;left:0;width:1160px;height:640px;transform-origin:0 0;transition:transform .5s cubic-bezier(.4,.1,.2,1)}
svg.edges{position:absolute;inset:0;width:1160px;height:640px;overflow:visible}
svg.edges path{transition:opacity .45s,stroke-width .45s}
.node{position:absolute;border-radius:18px;padding:14px 17px;background:linear-gradient(180deg,rgba(255,255,255,.062),rgba(255,255,255,.02));border:1px solid rgba(255,255,255,.10);-webkit-backdrop-filter:blur(13px) saturate(1.3);backdrop-filter:blur(13px) saturate(1.3);box-shadow:0 18px 50px -22px rgba(0,0,0,.85),inset 0 1px 0 rgba(255,255,255,.09);transition:opacity .45s,filter .45s,transform .45s,box-shadow .45s;cursor:pointer;z-index:3}
.node.pillar{width:300px;min-height:100px}
.node.answer{width:420px;min-height:210px;padding:20px 24px;border-color:rgba(154,134,255,.26);background:linear-gradient(180deg,rgba(154,134,255,.10),rgba(255,255,255,.02));box-shadow:0 24px 74px -20px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.12),0 0 84px -22px var(--indigo)}
.node .kind{display:flex;align-items:center;gap:7px;font-size:9.5px;letter-spacing:.15em;text-transform:uppercase;font-weight:700;margin-bottom:9px}
.node .kind .d{width:7px;height:7px;border-radius:50%}
.node .title{font-size:15.5px;font-weight:540;letter-spacing:-.01em;line-height:1.26}
.node.answer .title{font-size:22px;font-weight:600;line-height:1.22;margin:5px 0 2px}
.node.answer .verdict{font-size:11.5px;color:var(--mut);margin-top:9px}
.node .cb{margin-top:11px}
.lb{display:inline-flex;align-items:center;gap:4px;font-size:8.5px;letter-spacing:.11em;text-transform:uppercase;font-weight:700;color:var(--indigo);background:rgba(154,134,255,.13);border:1px solid rgba(154,134,255,.3);border-radius:999px;padding:2px 7px;margin-top:9px}
.node.lbn::before{content:"";position:absolute;inset:-1px;border-radius:18px;border:1px solid rgba(154,134,255,.32);animation:ring 3.6s ease-in-out infinite;pointer-events:none}
@keyframes ring{0%,100%{opacity:.2}50%{opacity:.6}}
/* highlight mode */
.stage.mode .node.dim{opacity:.2;filter:blur(1.4px)}
.stage.mode .node.sel{transform:translateY(-2px);box-shadow:0 22px 60px -20px rgba(0,0,0,.9),inset 0 1px 0 rgba(255,255,255,.12),0 0 0 1.5px rgba(154,134,255,.5),0 0 60px -14px var(--indigo)}
/* segment confidence bar — the one bar, used everywhere */
.seg{display:flex;gap:4px;align-items:center}.seg i{width:15px;height:7px;border-radius:2px;background:rgba(255,255,255,.11);transition:.3s}
.seg .l{font-size:9.5px;color:var(--faint);margin-left:7px;letter-spacing:.05em;text-transform:uppercase;font-weight:600}
/* sidebar */
.side{position:fixed;top:0;right:0;bottom:0;width:var(--sb);z-index:9;padding:22px 22px 26px;overflow:auto;background:linear-gradient(180deg,rgba(19,21,27,.72),rgba(11,12,16,.86));border-left:1px solid rgba(255,255,255,.08);-webkit-backdrop-filter:blur(24px) saturate(1.25);backdrop-filter:blur(24px) saturate(1.25)}
.side .sk{font-size:10px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;margin-bottom:8px}
.side h2{font-size:20px;font-weight:600;letter-spacing:-.02em;line-height:1.24}
.side .row{margin-top:17px}.side .rl{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:600;margin-bottom:8px}
.side .why{font-size:13.5px;line-height:1.5;color:rgba(245,245,247,.86)}
.ev{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 13px;margin-bottom:8px;transition:.3s}
.ev:hover{border-color:rgba(255,255,255,.16);background:rgba(255,255,255,.05)}
.ev .q{font-size:13px;line-height:1.46;color:rgba(245,245,247,.9)}
.ev .s{display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:10.5px;color:var(--mut)}.ev .s a{color:var(--blue);text-decoration:none}
.ev .src{display:flex;align-items:center;gap:6px}.ev .src .dd{width:5px;height:5px;border-radius:50%}
.flip{font-size:13px;color:var(--amber);line-height:1.46;background:rgba(240,180,94,.06);border:1px solid rgba(240,180,94,.18);border-radius:11px;padding:10px 12px}
.hint{position:fixed;bottom:16px;left:24px;z-index:6;font-size:11px;color:var(--faint)}
@media(max-width:820px){:root{--sb:0px}.side{top:auto;bottom:0;width:100%;height:46%;border-left:0;border-top:1px solid rgba(255,255,255,.08)}.graph{bottom:46%}.toggle{right:16px}.hdr{right:0}}
</style></head><body>
<div class="hdr"><div class="ask">You asked</div><div class="q">What is the significance of Kimi&nbsp;3?<span class="c">▏</span></div></div>
<div class="toggle" id="tg" onclick="toggleSpot(event)"><span class="sw"></span> load-bearing</div>
<div class="graph" id="graph"><div class="stage" id="stage">
 <svg class="edges" viewBox="0 0 1160 640"><defs>
   <filter id="gl" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
   <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse"><path d="M0 1 L9 5 L0 9 Z" fill="#9a86ff" opacity=".85"/></marker>
   <linearGradient id="eg" x1="0" x2="1"><stop offset="0" stop-color="#6b7688"/><stop offset="1" stop-color="#9a86ff"/></linearGradient></defs>
   <g id="edges" filter="url(#gl)"></g></svg>
 <div id="nodes"></div>
</div></div>
<div class="side" id="side"></div>
<div class="hint">click a claim → see what it rests on · click empty space to reset</div>
<script>
const A={green:'#5ad9a6',amber:'#f0b45e',gray:'#8a93a3',indigo:'#9a86ff',blue:'#5b9dff'};
const N=[
 {id:'ANS',cls:'answer',x:720,y:212,kind:'The answer',kc:A.indigo,conf:3,
  verdict:'Calibrated across 11 sub-questions · contested where evidence is thin',
  title:'A credible, cheap, near-frontier model — not a proven breakthrough.',
  why:'Built from the claims on the left. It leans hardest on two: that K3 is independently near-frontier, and that its headline wins are not independently reproduced.',
  ev:[{q:'K3 scores 57 on the Intelligence Index — #3 overall, comparable to Opus 4.8.',s:'Artificial Analysis',c:A.green,u:'artificialanalysis.ai'},
      {q:'Every published K3 number is Moonshot-reported; no third-party benchmarks yet.',s:'Tom’s Hardware',c:A.green,u:'tomshardware.com'},
      {q:'Agent-harness choice alone swings scores by ~17 points.',s:'Kili Technology',c:A.green,u:'kili-technology.com'}]},
 {id:'P1',x:40,y:20,kind:'Proposition',kc:A.green,conf:4,lb:true,title:'Independently ranked ~#3, Opus-4.8 level',
  why:'What makes “credible / near-frontier” true at all — the load-bearing support for the positive half of the answer.',
  flip:'An independent, same-harness evaluation placing K3 well below the top tier.',
  ev:[{q:'K3 scores 57 on the Intelligence Index — #3 overall, comparable to Opus 4.8 and GPT-5.5.',s:'Artificial Analysis',c:A.green,u:'artificialanalysis.ai'},
      {q:'Independent blind community voting places K3 on the WebDev arena leaderboard.',s:'Arena',c:A.green,u:'arena.ai'}]},
 {id:'P2',x:40,y:142,kind:'Proposition',kc:A.green,conf:4,lb:true,title:'Headline wins aren’t independently reproduced',
  why:'What caps the answer below “proven breakthrough.” Without it, the marketing numbers would carry the verdict.',
  flip:'Moonshot’s technical report plus third-party reproductions matching the headline numbers.',
  ev:[{q:'Every published K3 number is Moonshot-reported or drawn from its own API.',s:'Tom’s Hardware',c:A.green,u:'tomshardware.com'},
      {q:'No independent third-party benchmarks for K3 exist yet.',s:'techsy.io',c:A.green,u:'techsy.io'},
      {q:'Agent-harness choice alone swings scores dramatically — a 17-point gap.',s:'Kili Technology',c:A.green,u:'kili-technology.com'}]},
 {id:'P3',x:40,y:264,kind:'Proposition',kc:A.green,conf:3,title:'Materially cheaper & independently runnable',
  why:'Supports the “cheap / accessible” half — solid, though real cost-of-ownership isn’t fully pinned down.',
  flip:'Deployment costs or license limits eating the sticker-price advantage.',
  ev:[{q:'Listed at $3 / $15 per million tokens — materially below comparable US models.',s:'OpenRouter',c:A.green,u:'openrouter.ai'},
      {q:'Runnable by independent users on available multi-GPU hardware.',s:'HF overview',c:A.green,u:'huggingface.co'}]},
 {id:'P4',x:40,y:386,kind:'Proposition',kc:A.amber,conf:2,title:'Not yet fully open (weights ~July 27)',
  why:'A caveat on the “open” framing — currently a promise, not a fact, so it can’t yet count toward the answer.',
  flip:'Weights plus a permissive license actually shipping on July 27.',
  ev:[{q:'Open weights promised on Hugging Face “by July 27”; license terms still TBD.',s:'release notes',c:A.amber,u:''}]},
 {id:'P5',x:40,y:508,kind:'Proposition',kc:A.gray,conf:1,title:'An efficiency breakthrough?',
  why:'Speculative — not load-bearing. It could strengthen the answer, but there’s no evidence either way yet.',
  flip:'A published analysis isolating architecture/training efficiency from raw scale.',
  ev:[{q:'No independent analysis separates architecture efficiency from scale. Too early.',s:'—',c:A.gray,u:''}]},
];
const EDGES=[['P1','ANS'],['P2','ANS'],['P3','ANS'],['P4','ANS'],['P5','ANS']];
const byId={};N.forEach(n=>byId[n.id]=n);
const nb={ANS:N.filter(n=>n.id!='ANS').map(n=>n.id)};N.forEach(n=>{if(n.id!='ANS')nb[n.id]=['ANS']});
function seg(conf,color,label){let s='<div class="seg">';for(let i=0;i<5;i++)s+=`<i style="background:${i<conf?color:'rgba(255,255,255,.11)'}"></i>`;return s+(label?`<span class="l">${conf}/5</span>`:'')+'</div>'}
// nodes
const nc=document.getElementById('nodes');
N.forEach(n=>{const d=document.createElement('div');d.className='node '+(n.cls||'pillar')+(n.lb?' lbn':'');d.style.left=n.x+'px';d.style.top=n.y+'px';d.dataset.id=n.id;
 let h=`<div class="kind" style="color:${n.kc}"><span class="d" style="background:${n.kc}"></span>${n.kind}</div><div class="title">${n.title}</div>`;
 h+=`<div class="cb">${seg(n.conf,n.kc,n.cls=='answer')}</div>`;
 if(n.cls=='answer')h+=`<div class="verdict">${n.verdict}</div>`;else if(n.lb)h+=`<div class="lb">◆ load-bearing</div>`;
 d.innerHTML=h;d.onclick=e=>{e.stopPropagation();select(n.id)};nc.appendChild(d)});
// edges
const eg=document.getElementById('edges');
function cy(n){return n.y+(n.cls=='answer'?105:50)}
EDGES.forEach(([a,b])=>{const s=byId[a],t=byId[b],x1=s.x+300,y1=cy(s),x2=t.x,y2=cy(t);
 const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.setAttribute('d',`M${x1},${y1} C${x1+140},${y1} ${x2-140},${y2} ${x2},${y2}`);
 p.setAttribute('stroke','url(#eg)');p.setAttribute('stroke-width',s.lb?2.1:1.4);p.setAttribute('fill','none');p.setAttribute('marker-end','url(#ar)');p.setAttribute('opacity',s.lb?.9:.55);p.dataset.a=a;p.id='e-'+a;eg.appendChild(p);
 const c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('r',s.lb?2.5:1.9);c.setAttribute('fill',s.lb?'#c9c2ff':'#8b93a8');c.dataset.a=a;
 const am=document.createElementNS('http://www.w3.org/2000/svg','animateMotion');am.setAttribute('dur',(2.3+Math.random()*1.3).toFixed(1)+'s');am.setAttribute('repeatCount','indefinite');
 const mp=document.createElementNS('http://www.w3.org/2000/svg','mpath');mp.setAttributeNS('http://www.w3.org/1999/xlink','href','#e-'+a);mp.setAttribute('href','#e-'+a);am.appendChild(mp);c.appendChild(am);eg.appendChild(c)});
// fit
const stage=document.getElementById('stage'),graph=document.getElementById('graph'),W=1160,H=640;
function fit(){const r=graph.getBoundingClientRect();const s=Math.min(r.width/W,r.height/H)*.9;stage.style.transform=`translate(${(r.width-W*s)/2}px,${(r.height-H*s)/2+18}px) scale(${s})`}
fit();addEventListener('resize',fit);
// select / highlight (full tree stays; relevant lights up)
let sel=null;
function paint(){document.querySelectorAll('.node').forEach(e=>{e.classList.remove('sel','dim')});
 document.querySelectorAll('#edges path').forEach(p=>{p.style.opacity=byId[p.dataset.a].lb?.9:.55;p.style.strokeWidth=byId[p.dataset.a].lb?2.1:1.4});
 document.querySelectorAll('#edges circle').forEach(c=>c.style.opacity=1);
 stage.classList.toggle('mode',!!sel||spot);
 if(sel){const keep=new Set([sel,...nb[sel]]);
   document.querySelectorAll('.node').forEach(e=>{if(e.dataset.id==sel)e.classList.add('sel');else if(!keep.has(e.dataset.id))e.classList.add('dim')});
   document.querySelectorAll('#edges path').forEach(p=>{const on=(p.dataset.a==sel||sel=='ANS');p.style.opacity=on?1:.08;p.style.strokeWidth=on?2.4:1.2});
   document.querySelectorAll('#edges circle').forEach(c=>c.style.opacity=(c.dataset.a==sel||sel=='ANS')?1:.06);
 }
 if(spot){document.querySelectorAll('.node').forEach(e=>{const n=byId[e.dataset.id];if(!(n.lb||n.cls=='answer')&&e.dataset.id!=sel)e.classList.add('dim')});
   document.querySelectorAll('#edges path').forEach(p=>{if(!byId[p.dataset.a].lb&&p.dataset.a!=sel)p.style.opacity=.06})}
}
function sidebar(id){const s=document.getElementById('side');const n=id?byId[id]:byId['ANS'];
 const ev=(n.ev||[]).map(e=>`<div class="ev"><div class="q">“${e.q}”</div><div class="s"><span class="src"><span class="dd" style="background:${e.c}"></span>${e.s}</span>${e.u?`<a href="https://${e.u}" target="_blank">${e.u} ↗</a>`:''}</div></div>`).join('');
 s.innerHTML=`<div class="sk" style="color:${n.kc}">${id?n.kind:'Top evidence'}${n.lb?' · ◆ load-bearing':''}</div><h2>${n.title}</h2>
  <div class="row"><div class="rl">confidence</div>${seg(n.conf,n.kc,true)}</div>
  ${n.why?`<div class="row"><div class="rl">${id&&id!='ANS'?'why it matters':'how it’s built'}</div><div class="why">${n.why}</div></div>`:''}
  <div class="row"><div class="rl">${id&&id!='ANS'?'supporting evidence':'strongest evidence'}</div>${ev}</div>
  ${n.flip?`<div class="row"><div class="rl">what would change this</div><div class="flip">${n.flip}</div></div>`:''}`;
}
function select(id){sel=id;paint();sidebar(id)}
function reset(){sel=null;paint();sidebar(null)}
document.getElementById('graph').addEventListener('click',reset);
let spot=false;
function toggleSpot(e){e.stopPropagation();spot=!spot;document.getElementById('tg').classList.toggle('on',spot);paint()}
reset();
</script></body></html>
